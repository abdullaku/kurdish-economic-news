<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هەواڵی ئابووری و فۆرێکس</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* هێنانی فۆنتی ڕووداو */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        @font-face {
            font-family: 'Rudaw';
            src: url('https://raw.githubusercontent.com/SoranH/KurdishFonts/master/Rudaw/RudawRegular.ttf');
        }

        :root {
            --gold: #fbbf24;
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #e6edf3;
        }

        body {
            font-family: 'Rudaw', 'Noto Sans Arabic', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* شریتی نرخی دراوەکان (Live Ticker) */
        .ticker-container {
            width: 100%;
            background: #1f2937;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 40px;
            display: flex;
            align-items: center;
        }

        /* بەستنەوە بە ویجێتی فەرمی بۆ نرخە ڕاستەوخۆکان */
        .ticker-wrap {
            width: 100%;
            height: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 50px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--gold);
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(251, 191, 36, 0.2);
        }

        header p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #30363d;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #30363d;
        }

        .news-content {
            padding: 20px;
            flex-grow: 1;
        }

        .news-tag {
            color: var(--gold);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 1.3rem;
            line-height: 1.5;
            margin: 0 0 15px 0;
            color: #fff;
        }

        .news-summary {
            color: #8b949e;
            font-size: 0.95rem;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-footer {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #6e7681;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            margin-top: 60px;
            border-top: 1px solid #30363d;
            background: #090c10;
        }

        footer p {
            margin: 5px 0;
            color: #8b949e;
        }

        .copyright {
            color: var(--gold) !important;
            font-weight: bold;
            margin-top: 15px !important;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- شریتی نرخە ڕاستەوخۆکان لە TradingView وە -->
    <div class="ticker-container">
        <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=en#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22FOREXCOM%3ASPX500%22%2C%22title%22%3A%22S%26P%20500%22%7D%2C%7B%22proName%22%3A%22FOREXCOM%3ANSXUSD%22%2C%22title%22%3A%22Nasdaq%20100%22%7D%2C%7B%22proName%22%3A%22FX_IDC%3AEURUSD%22%2C%22title%22%3A%22EUR%2FUSD%22%7D%2C%7B%22proName%22%3A%22BITSTAMP%3ABTCUSD%22%2C%22title%22%3A%22BTC%2FUSD%22%7D%2C%7B%22proName%22%3A%22BITSTAMP%3AETHUSD%22%2C%22title%22%3A%22ETH%2FUSD%22%7D%2C%7B%22description%22%3A%22GOLD%22%2C%22proName%22%3A%22OANDA%3AXAUUSD%22%7D%5D%2C%22showSymbolLogo%22%3Atrue%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%2C%22displayMode%22%3A%22adaptive%22%7D" style="box-sizing: border-box; height: 40px; width: 100%;"></iframe>
    </div>

    <div class="container">
        <header>
            <h1>هەواڵی ئابووری و فۆرێکس</h1>
            <p>سەرچاوەی متمانەپێکراوی تۆ بۆ جیهانی بازرگانی و دارایی</p>
        </header>

        <div id="news-container" class="news-grid">
            <!-- لێرە هەواڵەکان بە شێوەی ئۆتۆماتیکی پڕ دەبنەوە -->
        </div>

        <footer>
            <p>دروستکراوە بۆ خزمەتگوزاری هەواڵی ئابووری</p>
            <p>دیزاین و پەرەپێدان: <strong>عەبدوڵڵا عەلی</strong></p>
            <p class="copyright">© ٢٠٢٦ هەموو مافەکان پارێزراوە بۆ پەیجەکەمان</p>
        </footer>
    </div>

    <script>
        // زانیارییەکانی Supabase
        const SUPABASE_URL = 'https://xekpxulamhgplnxfnczp.supabase.co';
        const SUPABASE_KEY = 'لێرە_کۆدەکەت_دابنێ'; // کۆدی Anon Key لێرە دابنێ

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchNews() {
            const { data, error } = await _supabase
                .from('news')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error("هەڵە لە هێنانی داتا:", error);
                return;
            }

            const container = document.getElementById('news-container');
            container.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                
                // دروستکردنی کاتێکی جوانتر
                const dateStr = item.published_at ? item.published_at.split(' ')[0] : '٢٠٢٦';

                card.innerHTML = `
                    ${item.image_url ? `<img src="${item.image_url}" class="news-image" alt="news">` : ''}
                    <div class="news-content">
                        <span class="news-tag">LIVE NEWS</span>
                        <h2 class="news-title">${item.title_ku}</h2>
                        <p class="news-summary">${item.summary_ku || ''}</p>
                    </div>
                    <div class="news-footer">
                        <span>📅 ${dateStr}</span>
                        <span>Bloomberg | وەرگێڕدراو</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // بانگکردنی فەرمانەکە
        fetchNews();
    </script>
</body>
</html>
