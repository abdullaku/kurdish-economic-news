<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هەواڵی ئابووری و فۆرێکس</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --dark: #0A0E1A;
            --dark-card: #111827;
            --dark-border: #1E2A3A;
            --text: #E8EDF5;
            --text-muted: #8A9BB0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            direction: rtl;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #0A0E1A 0%, #111827 100%);
            border-bottom: 1px solid var(--dark-border);
            padding: 1.5rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .news-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #1a2333;
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--gold);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .card-summary {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--dark-border);
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .telegram-bar {
            background: linear-gradient(135deg, #0088cc, #005588);
            color: white;
            padding: 1rem;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .tg-link {
            color: white;
            text-decoration: underline;
            font-weight: bold;
        }

        .loading { text-align: center; padding: 3rem; font-size: 1.2rem; color: var(--gold); }

        @media (max-width: 600px) {
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">💹 هەواڵی ئابووری و فۆرێکس</div>
</header>

<main>
    <div class="telegram-bar">
        بۆ وەرگرتنی هەواڵەکان لە تێلیگرام: <a href="https://t.me/Economic_news_Kurdish" class="tg-link" target="_blank">سەردانمان بکە</a>
    </div>

    <div id="news-container" class="news-grid">
        <div class="loading">چاوەڕێ بکە، هەواڵەکان باردەکرێن...</div>
    </div>
</main>

<script>
    const SUPABASE_URL = 'https://xekpxulamhgplnxfnczp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3i3wA3W-__nQLysnBSB6sQ__Ye-Bn4P';

    async function getNews() {
        const container = document.getElementById('news-container');
        try {
            const response = await fetch(
                `${SUPABASE_URL}/rest/v1/news?select=*&order=published_at.desc&limit=24`,
                {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                }
            );
            const data = await response.json();

            if (data.length === 0) {
                container.innerHTML = '<div class="loading">هیچ هەواڵێک نەدۆزرایەوە.</div>';
                return;
            }

            container.innerHTML = ''; // پاککردنەوەی بارکەرەکە

            data.forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.target = "_blank";
                card.className = 'news-card';

                // وێنەی سەرەکی یان وێنەیەکی دیفۆڵت ئەگەر وێنەی نەبوو
                const imageSrc = item.image_url || 'https://images.unsplash.com/photo-1611974717482-9831d3ea748c?auto=format&fit=crop&w=400&q=80';

                card.innerHTML = `
                    <img src="${imageSrc}" class="card-image" alt="news">
                    <div class="card-content">
                        <div class="card-meta">
                            <span>${item.source}</span>
                            <span>${item.pairs || ''}</span>
                        </div>
                        <h2 class="card-title">${item.title_ku}</h2>
                        <p class="card-summary">${item.summary_ku}</p>
                    </div>
                    <div class="card-footer">
                        <span>📅 ${item.published_at ? item.published_at.split('T')[0] : 'ئێستا'}</span>
                        <span style="color:var(--gold)">خوێندنەوە...</span>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            container.innerHTML = '<div class="loading">کێشەیەک ڕوویدا لە کاتی هێنانی زانیارییەکان.</div>';
            console.error(error);
        }
    }

    getNews();
</script>

</body>
</html>
