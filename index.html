<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>هەواڵی ئابووری کوردی</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

@font-face{
font-family:Rudaw;
src:url("https://raw.githubusercontent.com/SoranH/KurdishFonts/master/Rudaw/RudawRegular.ttf");
}

:root{
--gold:#fbbf24;
--bg:#0b111a;
--card:#161b22;
--text:#e6edf3;
--border:#30363d;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Rudaw,Tahoma;
}

/* header */

header{
background:#0f141d;
border-bottom:1px solid var(--border);
padding:20px;
text-align:center;
}

.header-main{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
}

.live{
background:#ff4d4d22;
color:#ff4d4d;
padding:4px 10px;
border-radius:20px;
font-size:13px;
}

header h1{
margin:0;
color:var(--gold);
font-size:26px;
}

.sub{
font-size:13px;
color:#8b949e;
}

/* ticker */

.ticker{
height:40px;
border-top:1px solid var(--border);
border-bottom:1px solid var(--border);
}

.ticker iframe{
width:100%;
height:40px;
}

/* container */

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.section{
display:flex;
align-items:center;
margin-top:30px;
}

.line{
flex:1;
height:1px;
background:linear-gradient(to left,var(--gold),transparent);
margin-right:15px;
}

.section h2{
margin:0;
font-size:22px;
}

.stats{
display:flex;
justify-content:space-between;
color:#8b949e;
margin-top:10px;
}

/* cards */

.news-grid{
display:grid;
gap:20px;
margin-top:20px;
}

.news-card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:20px;

opacity:0;
transform:translateY(20px);
animation:fadeUp .6s forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.news-image{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.news-meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#8b949e;
margin-bottom:10px;
}

.source{
background:#fbbf2415;
color:var(--gold);
padding:2px 10px;
border-radius:10px;
}

.news-title{
font-size:22px;
margin:10px 0;
}

.news-summary{
color:#9ca3af;
line-height:1.7;
}

.read{
color:var(--gold);
text-decoration:none;
font-size:14px;
}

/* footer */

footer{
margin-top:60px;
padding:30px;
text-align:center;
border-top:1px solid var(--border);
color:#8b949e;
}

</style>
</head>


<body>

<header>

<div class="header-main">

<div class="live">زیندوو</div>

<div>
<h1>هەواڵی ئابووری کوردی</h1>
<div class="sub">Kurdish Economic News</div>
</div>

</div>

</header>

<div class="ticker">

<iframe scrolling="no" frameborder="0"
src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=en#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22FOREXCOM%3ASPX500%22%7D%2C%7B%22proName%22%3A%22FX_IDC%3AEURUSD%22%7D%2C%7B%22proName%22%3A%22BITSTAMP%3ABTCUSD%22%7D%2C%7B%22proName%22%3A%22OANDA%3AXAUUSD%22%7D%5D%2C%22colorTheme%22%3A%22dark%22%7D">
</iframe>

</div>


<div class="container">

<div class="section">
<div class="line"></div>
<h2>دواین هەواڵەکان 📰</h2>
</div>

<div class="stats">
<span id="update-time"></span>
<span id="news-count"></span>
</div>

<div id="news-container" class="news-grid"></div>

<footer>
© 2026 عەبدوڵڵا عەلی
</footer>

</div>


<script>

const SUPABASE_URL="https://xekpxulamhgplnxfnczp.supabase.co"
const SUPABASE_KEY="Sb_publishable_3i3wA3W-__nQLysnBSB6sQ__Ye-Bn4P"

const supa=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function fetchNews(){

const {data,error}=await supa
.from("news")
.select("*")
.order("id",{ascending:false})

if(error) return

document.getElementById("news-count").innerText=
"کۆی هەواڵ: "+data.length

const container=document.getElementById("news-container")

container.innerHTML=""

data.forEach(item=>{

container.innerHTML+=`

<div class="news-card">

<img src="${item.image_url || "https://via.placeholder.com/800x400"}"
class="news-image">

<div class="news-meta">

<span>📅 ${item.published_at || "2026"}</span>

<span class="source">Bloomberg</span>

</div>

<div class="news-title">${item.title_ku}</div>

<div class="news-summary">
${item.summary_ku || ""}
</div>

<a class="read" href="#">زیاتر بخوێنەوە ←</a>

</div>

`

})

}

fetchNews()

setInterval(fetchNews,60000)

/* live time */

function updateTime(){

const now=new Date()

document.getElementById("update-time").innerText=
"نۆژەنکردنەوە: "+now.toLocaleTimeString("ar-IQ")

}

updateTime()

setInterval(updateTime,1000)

</script>

</body>
</html>
