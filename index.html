<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هەواڵی ئابووری کوردی</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @font-face {
            font-family: 'Rudaw';
            src: url('https://raw.githubusercontent.com/SoranH/KurdishFonts/master/Rudaw/RudawRegular.ttf');
        }

        :root {
            --gold: #fbbf24;
            --bg: #0b0e14;
            --card-bg: #161b22;
            --text: #e6edf3;
            --red: #ff4d4d;
            --green: #00ff88;
        }

        body {
            font-family: 'Rudaw', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* بەشی سەرەوە بەپێی وێنەکە */
        header {
            background: #0f141d;
            padding: 20px;
            border-bottom: 1px solid #1f2937;
            text-align: center;
        }

        .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .live-tag {
            background: rgba(255, 77, 77, 0.15);
            color: var(--red);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-tag::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        header h1 {
            color: var(--gold);
            margin: 0;
            font-size: 1.8rem;
        }

        .sub-title {
            color: #8b949e;
            font-size: 0.9rem;
            display: block;
        }

        /* بەشی نرخە ڕاستەوخۆکان */
        .live-prices {
            background: #161b22;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 12px;
            border-radius: 8px;
            margin: 15px auto;
            max-width: 800px;
            font-size: 0.9rem;
            border: 1px solid #30363d;
        }

        .price-item {
            display: flex;
            gap: 8px;
        }

        .price-label { color: var(--gold); }
        .price-value { font-weight: bold; }
        .up { color: var(--green); }
        .down { color: var(--red); }

        /* بەشی هەواڵەکان */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            margin: 30px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .news-grid { display: grid; gap: 20px; }

        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #30363d;
            position: relative;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .news-title {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .news-summary {
            color: #8b949e;
            font-size: 1rem;
            line-height: 1.8;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="live-tag">زیندوو</div>
            <div>
                <h1>هەواڵی ئابووری کوردی</h1>
                <span class="sub-title">Kurdish Economic News</span>
            </div>
        </div>

        <div class="live-prices" id="live-ticker">
            <div class="price-item">
                <span class="price-label">GOLD</span>
                <span class="price-value up">$2,158.45 ▲</span>
            </div>
            <div class="price-item">
                <span class="price-label">BTC/USD</span>
                <span class="price-value down">$68,420.10 ▼</span>
            </div>
            <div class="price-item">
                <span class="price-label">EUR/USD</span>
                <span class="price-value up">1.0842 ▲</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="section-title">
            <h2>📰 دوایین هەواڵەکان</h2>
        </div>

        <div id="news-container" class="news-grid">
            <!-- هەواڵەکان لێرە دەردەکەون -->
        </div>

        <footer>
            <p>© ٢٠٢٦ هەموو مافەکان پارێزراوە - عەبدوڵڵا عەلی</p>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://xekpxulamhgplnxfnczp.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_3i3wA3W-__nQLysnBSB6sQ__Ye-Bn4P'; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // هێنانی نرخەکان بە شێوەی ئۆتۆماتیکی
        async function updatePrices() {
            // تێبینی: لێرە دەتوانیت فێچی نرخەکان لە API بکەیت، ئێستا بۆ نموونە دامناوە
            // بۆ ئەوەی نرخەکان بە تەواوی ڕاستەوخۆ بن، دەتوانیت Binance API بەکاربهێنیت
        }

        async function fetchNews() {
            const { data, error } = await _supabase
                .from('news')
                .select('*')
                .order('id', { ascending: false });

            if (error) return;

            const container = document.getElementById('news-container');
            container.innerHTML = '';

            data.forEach(item => {
                container.innerHTML += `
                    <div class="news-card">
                        <div class="news-header">
                            <span>📅 ${item.published_at || '٢٠٢٦'}</span>
                            <span style="color:var(--gold)">Bloomberg</span>
                        </div>
                        <h2 class="news-title">${item.title_ku}</h2>
                        <p class="news-summary">${item.summary_ku || ''}</p>
                    </div>`;
            });
        }

        fetchNews();
        setInterval(updatePrices, 5000); // نوێکردنەوەی نرخەکان هەموو ٥ چرکەیەک
    </script>
</body>
</html>
