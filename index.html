<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هەواڵی ئابووری کوردی</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @font-face { font-family: 'Rudaw'; src: url('https://raw.githubusercontent.com/SoranH/KurdishFonts/master/Rudaw/RudawRegular.ttf'); }
        :root { --gold: #fbbf24; --bg: #0b111a; --card: #161b22; --text: #e6edf3; --border: #30363d; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Rudaw', Tahoma; }
        header { background: #0f141d; border-bottom: 1px solid var(--border); padding: 20px; text-align: center; }
        .live-tag { background: #ff4d4d22; color: #ff4d4d; padding: 4px 10px; border-radius: 20px; font-size: 13px; display: inline-block; margin-bottom: 10px; }
        header h1 { margin: 0; color: var(--gold); font-size: 26px; }
        .ticker { height: 40px; border-bottom: 1px solid var(--border); background: #000; overflow: hidden; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .section-title { display: flex; align-items: center; gap: 15px; margin: 30px 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .news-title { font-size: 20px; color: #fff; margin-bottom: 10px; font-weight: bold; }
        .news-summary { color: #8b949e; line-height: 1.7; font-size: 15px; }
        #status-msg { text-align: center; padding: 20px; color: var(--gold); }
        footer { margin-top: 50px; padding: 30px; text-align: center; border-top: 1px solid var(--border); color: #8b949e; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div class="live-tag">زیندوو</div>
    <h1>هەواڵی ئابووری کوردی</h1>
    <div style="color:#8b949e; font-size:12px; margin-top:5px;">Kurdish Economic News</div>
</header>

<div class="ticker">
    <iframe scrolling="no" frameborder="0" src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=en#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22BITSTAMP%3ABTCUSD%22%7D%2C%7B%22proName%22%3A%22OANDA%3AXAUUSD%22%7D%2C%7B%22proName%22%3A%22FX_IDC%3AEURUSD%22%7D%5D%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%7D" style="width:100%; height:40px;"></iframe>
</div>

<div class="container">
    <div class="section-title">
        <h2>دواین هەواڵەکان 📰</h2>
    </div>
    
    <div id="status-msg">لە هەوڵی هێنانی هەواڵەکانداین...</div>
    <div id="news-container"></div>
</div>

<footer>
    © 2026 هەموو مافەکان پارێزراوە - عەبدوڵڵا عەلی
</footer>

<script>
    const SUPABASE_URL = "https://xekpxulamhgplnxfnczp.supabase.co";
    const SUPABASE_KEY = "Sb_publishable_3i3wA3W-__nQLysnBSB6sQ__Ye-Bn4P";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadNews() {
        const container = document.getElementById("news-container");
        const status = document.getElementById("status-msg");

        try {
            const { data, error } = await supabaseClient
                .from("news")
                .select("*")
                .order("id", { ascending: false });

            if (error) {
                status.innerHTML = "❌ هەڵە لە داتابەیس: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                status.innerHTML = "⚠️ پەیوەندی هەیە بەڵام هیچ هەواڵێک لە داتابەیسدا نییە!";
                return;
            }

            status.style.display = "none";
            container.innerHTML = "";

            data.forEach(item => {
                container.innerHTML += `
                    <div class="news-card">
                        <div style="font-size:12px; color:var(--gold); margin-bottom:8px;">📅 بەروار: ${item.published_at || '2026'}</div>
                        <div class="news-title">${item.title_ku}</div>
                        <div class="news-summary">${item.summary_ku || ""}</div>
                    </div>`;
            });
        } catch (e) {
            status.innerHTML = "❌ هەڵەیەکی چاوەڕواننەکراو ڕوویدا.";
        }
    }

    loadNews();
    // هەر ١ خولەک جارێک هەواڵەکان نوێ دەبنەوە
    setInterval(loadNews, 60000);
</script>
</body>
</html>
