<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هەواڵی ئابووری کوردی</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @font-face {
            font-family: 'Rudaw';
            src: url('https://raw.githubusercontent.com/SoranH/KurdishFonts/master/Rudaw/RudawRegular.ttf');
        }

        :root {
            --gold: #fbbf24;
            --bg: #0b111a;
            --card-bg: #161b22;
            --text: #e6edf3;
            --red: #ff4d4d;
            --green: #00ff88;
        }

        body {
            font-family: 'Rudaw', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* بەشی سەرەوە */
        header {
            background: #0f141d;
            padding: 20px 10px;
            text-align: center;
            border-bottom: 1px solid #30363d;
        }

        .header-main {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .live-tag {
            background: rgba(255, 77, 77, 0.15);
            color: var(--red);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        header h1 {
            color: var(--gold);
            margin: 0;
            font-size: 1.8rem;
        }

        .sub-title {
            color: #8b949e;
            font-size: 0.85rem;
            display: block;
        }

        /* شریتی نرخە جوڵاوەکان */
        .ticker-wrap {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid #30363d;
            border-bottom: 1px solid #30363d;
            height: 40px;
            overflow: hidden;
        }

        /* زانیارییەکانی سەر تایتڵ */
        .stats-bar {
            max-width: 800px;
            margin: 20px auto 0;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8b949e;
            font-size: 0.9rem;
        }

        .section-header {
            max-width: 800px;
            margin: 30px auto 10px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-header h2 {
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .line {
            height: 1px;
            background: linear-gradient(to left, var(--gold), transparent);
            flex-grow: 1;
            margin-right: 15px;
        }

        /* بەشی هەواڵەکان */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .news-grid { display: grid; gap: 20px; }

        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #30363d;
            position: relative;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #6e7681;
            margin-bottom: 15px;
        }

        .news-title {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 15px;
            color: #fff;
        }

        .news-summary {
            color: #8b949e;
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .read-more {
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
            border-top: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-main">
            <div class="live-tag">زیندوو</div>
            <div>
                <h1>هەواڵی ئابووری کوردی</h1>
                <span class="sub-title">Kurdish Economic News</span>
            </div>
        </div>
    </header>

    <div class="ticker-wrap">
        <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=en#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22FOREXCOM%3ASPX500%22%2C%22title%22%3A%22S%26P%20500%22%7D%2C%7B%22proName%22%3A%22FX_IDC%3AEURUSD%22%2C%22title%22%3A%22EUR%2FUSD%22%7D%2C%7B%22proName%22%3A%22BITSTAMP%3ABTCUSD%22%2C%22title%22%3A%22BTC%2FUSD%22%7D%2C%7B%22description%22%3A%22GOLD%22%2C%22proName%22%3A%22OANDA%3AXAUUSD%22%7D%5D%2C%22showSymbolLogo%22%3Atrue%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%2C%22displayMode%22%3A%22adaptive%22%7D" style="box-sizing: border-box; height: 40px; width: 100%;"></iframe>
    </div>

    <div class="section-header">
        <div class="line"></div>
        <h2>دواین هەواڵەکان 📰</h2>
    </div>

    <div class="stats-bar">
        <span id="update-time">نۆژەنکردنەوە: ١٠:٤٨:٢٠ ص</span>
        <span id="news-count">کۆی هەواڵ: ١٦</span>
    </div>

    <div class="container">
        <div id="news-container" class="news-grid"></div>
        
        <footer>
            <p>© ٢٠٢٦ هەموو مافەکان پارێزراوە - عەبدوڵڵا عەلی</p>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://xekpxulamhgplnxfnczp.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_3i3wA3W-__nQLysnBSB6sQ__Ye-Bn4P'; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchNews() {
            const { data, error } = await _supabase
                .from('news')
                .select('*')
                .order('id', { ascending: false });

            if (error) return;

            document.getElementById('news-count').innerText = `کۆی هەواڵ: ${data.length}`;
            
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            data.forEach(item => {
                container.innerHTML += `
                    <div class="news-card">
                        <div class="news-meta">
                            <span>📅 ${item.published_at || '٢٠٢٦'}</span>
                            <span style="background:rgba(251,191,36,0.1); color:var(--gold); padding:2px 10px; border-radius:10px;">Bloomberg</span>
                        </div>
                        <h2 class="news-title">${item.title_ku}</h2>
                        <p class="news-summary">${item.summary_ku || ''}</p>
                        <a href="#" class="read-more">زیاتر بخوێنەوە ←</a>
                    </div>`;
            });
        }

        fetchNews();
    </script>
</body>
</html>
